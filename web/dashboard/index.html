<!DOCTYPE html>

<head>

    <title>MySelf Dashboard</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>

<body>

<header>
    <h1>MySelf Dashboard</h1>

</header>

<section id="summary">
    <h2>Résumé</h2>
    <div id="summary-text">Chargement...</div>
</section>

<section id="stats">

<section id="records">

</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
